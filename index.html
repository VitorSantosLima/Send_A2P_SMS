<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disparos Multicanal</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card h3 {
  margin-bottom: 10px;
  font-size: 16px;
}

input {
  width: 100%;
  max-width: 100%; /* garante que não ultrapasse o card */
  box-sizing: border-box; /* inclui padding dentro da largura */
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1a73e8;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #155ab6;
}

pre {
  margin-top: 10px;
  background: #222;
  color: #0f0;
  padding: 10px;
  border-radius: 8px;
  font-size: 11px;
  max-height: 150px;
  overflow: auto;
}

@media(min-width: 768px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<h2>Disparos Multicanal</h2>

<div class="grid">

  <!-- SMS -->
  <div class="card">
    <h3>SMS</h3>
    <input placeholder="Nome" id="nome_sms">
    <input placeholder="Telefone (DDD + número)" id="tel_sms">
    <button onclick="enviar('sms')">Enviar</button>
    <pre id="res_sms"></pre>
  </div>

  <!-- Ligação sem IA -->
  <div class="card">
    <h3>Ligação sem IA</h3>
    <input placeholder="Nome" id="nome_call">
    <input placeholder="Telefone" id="tel_call">
    <button onclick="enviar('call')">Disparar</button>
    <pre id="res_call"></pre>
  </div>

  <!-- Ligação com IA -->
  <div class="card">
    <h3>Ligação com IA</h3>
    <input placeholder="Nome" id="nome_ai_call">
    <input placeholder="Telefone" id="tel_ai_call">
    <button onclick="enviar('ai_call')">Disparar</button>
    <pre id="res_ai_call"></pre>
  </div>

  <!-- WhatsApp + ligação -->
  <div class="card">
    <h3>WhatsApp + Ligação</h3>
    <input placeholder="Nome" id="nome_wpp_call">
    <input placeholder="Telefone" id="tel_wpp_call">
    <button onclick="enviar('wpp_call')">Disparar</button>
    <pre id="res_wpp_call"></pre>
  </div>

  <!-- WhatsApp + IA -->
  <div class="card">
    <h3>WhatsApp + IA</h3>
    <input placeholder="Nome" id="nome_wpp_ai">
    <input placeholder="Telefone" id="tel_wpp_ai">
    <button onclick="enviar('wpp_ai')">Disparar</button>
    <pre id="res_wpp_ai"></pre>
  </div>

</div>

<script>
function formatarTelefone(input) {
  let tel = input.replace(/\D/g, "");
  if (!tel.startsWith("55")) tel = "55" + tel;
  return tel;
}

async function enviar(tipo) {
  let nome, telefone, endpoint;

  switch(tipo) {
    case 'sms':
      nome = document.getElementById('nome_sms').value;
      telefone = formatarTelefone(document.getElementById('tel_sms').value);
      // 👉 AQUI você define o endpoint de SMS (já funcional via Voximplant)
      endpoint = `https://api.voximplant.com/platform_api/A2PSendSms?dst_numbers=${telefone}&text=Olá ${nome}`;
      break;

    case 'call':
      nome = document.getElementById('nome_call').value;
      telefone = formatarTelefone(document.getElementById('tel_call').value);
      // 👉 AQUI você coloca o endpoint da sua ligação SEM IA
      // Ex: webhook que inicia uma chamada via Voximplant
      endpoint = `https://SEU-ENDPOINT-CALL?phone=${telefone}&name=${nome}`;
      break;

    case 'ai_call':
      nome = document.getElementById('nome_ai_call').value;
      telefone = formatarTelefone(document.getElementById('tel_ai_call').value);
      // 👉 AQUI você coloca o endpoint da ligação COM IA (agent / bot de voz)
      endpoint = `https://SEU-ENDPOINT-AI-CALL?phone=${telefone}&name=${nome}`;
      break;

    case 'wpp_call':
      nome = document.getElementById('nome_wpp_call').value;
      telefone = formatarTelefone(document.getElementById('tel_wpp_call').value);
      // 👉 AQUI você chama o fluxo: WhatsApp template + fallback ligação
      endpoint = `https://SEU-ENDPOINT-WPP-CALL?phone=${telefone}&name=${nome}`;
      break;

    case 'wpp_ai':
      nome = document.getElementById('nome_wpp_ai').value;
      telefone = formatarTelefone(document.getElementById('tel_wpp_ai').value);
      // 👉 AQUI você chama o fluxo: WhatsApp + IA (ex: bot conversacional)
      endpoint = `https://SEU-ENDPOINT-WPP-AI?phone=${telefone}&name=${nome}`;
      break;
  }

  const resBox = document.getElementById(`res_${tipo}`);

  try {
    // 👉 ESTE É O FETCH EXECUTADO PARA TODOS OS BOTÕES
    // Ele usa o endpoint definido acima em cada case
    const response = await fetch(endpoint);

    // 👉 Aqui você pode trocar para response.json() se sua API retornar JSON
    const text = await response.text();

    resBox.innerText = text;
  } catch (e) {
    resBox.innerText = 'Erro na requisição';
  }
}
</script>

</body>
</html>
